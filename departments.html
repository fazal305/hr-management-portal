<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Departments | HR Management Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
    <link href="css/departments.css" rel="stylesheet" />
  </head>
  <body>
    <div class="hr-app">
      <div id="sidebarMount"></div>
      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="page-kicker">Organization</p>
            <h1 class="page-title">Departments</h1>
            <p class="page-subtitle">
              Manage org units, managers, employee counts, and department
              payroll totals.
            </p>
          </div>
          <button
            class="btn btn-outline-info mobile-nav-toggle"
            id="mobileNavToggle"
            type="button"
          >
            Menu
          </button>
        </header>
        <section class="content">
          <div id="statusMessage" class="status-message"></div>
          <section class="form-panel mb-3">
            <div class="panel-header">
              <div>
                <h2 class="panel-title" id="departmentFormTitle">
                  Add Department
                </h2>
                <p class="panel-note">
                  Departments with employees cannot be deleted accidentally.
                </p>
              </div>
              <button
                class="btn btn-outline-light"
                id="resetDepartmentForm"
                type="button"
              >
                Clear Form
              </button>
            </div>
            <form id="departmentForm">
              <input type="hidden" id="departmentId" />
              <div class="department-form-grid">
                <div>
                  <label class="form-label">Name</label
                  ><input class="form-control" id="departmentName" required />
                </div>
                <div>
                  <label class="form-label">Manager</label
                  ><select class="form-select" id="managerId"></select>
                </div>
                <div class="description-field">
                  <label class="form-label">Description</label
                  ><input
                    class="form-control"
                    id="departmentDescription"
                    required
                  />
                </div>
                <button class="btn btn-primary" type="submit">Save</button>
              </div>
            </form>
          </section>
          <section class="table-panel">
            <div class="filter-bar">
              <div>
                <label class="form-label">Search</label
                ><input
                  class="form-control"
                  id="departmentSearch"
                  placeholder="Search departments..."
                />
              </div>
              <button
                class="btn btn-outline-light"
                id="clearDepartmentFilters"
                type="button"
              >
                Clear
              </button>
            </div>
            <div id="departmentGrid" class="department-grid"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/departments.js"></script>
  </body>
</html>
