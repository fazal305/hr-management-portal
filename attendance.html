<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Attendance | HR Management Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
    <link href="css/attendance.css" rel="stylesheet" />
  </head>
  <body>
    <div class="hr-app">
      <div id="sidebarMount"></div>
      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="page-kicker">Time Tracking</p>
            <h1 class="page-title">Attendance</h1>
            <p class="page-subtitle">
              Mark daily attendance, prevent duplicate records, and filter
              attendance history.
            </p>
          </div>
          <button
            class="btn btn-outline-info mobile-nav-toggle"
            id="mobileNavToggle"
            type="button"
          >
            Menu
          </button>
        </header>
        <section class="content">
          <div id="statusMessage" class="status-message"></div>
          <div
            class="hr-grid grid-4 attendance-summary"
            id="attendanceStats"
          ></div>
          <section class="form-panel mb-3">
            <div class="panel-header">
              <div>
                <h2 class="panel-title" id="attendanceFormTitle">
                  Mark Attendance
                </h2>
                <p class="panel-note">
                  One attendance record is allowed per employee per date.
                </p>
              </div>
              <button
                class="btn btn-outline-light"
                id="resetAttendanceForm"
                type="button"
              >
                Clear Form
              </button>
            </div>
            <form id="attendanceForm">
              <input type="hidden" id="attendanceId" />
              <div class="attendance-form-grid">
                <div>
                  <label class="form-label">Employee</label
                  ><select
                    class="form-select"
                    id="attendanceEmployee"
                    required
                  ></select>
                </div>
                <div>
                  <label class="form-label">Date</label
                  ><input
                    class="form-control"
                    id="attendanceDate"
                    type="date"
                    required
                  />
                </div>
                <div>
                  <label class="form-label">Status</label
                  ><select class="form-select" id="attendanceStatus">
                    <option>Present</option>
                    <option>Absent</option>
                    <option>Late</option>
                    <option>Remote</option>
                  </select>
                </div>
                <div>
                  <label class="form-label">Check In</label
                  ><input class="form-control" id="checkIn" type="time" />
                </div>
                <div>
                  <label class="form-label">Notes</label
                  ><input
                    class="form-control"
                    id="attendanceNotes"
                    placeholder="Optional notes"
                  />
                </div>
                <button class="btn btn-primary" type="submit">Save</button>
              </div>
            </form>
          </section>
          <section class="table-panel">
            <div class="filter-bar">
              <div>
                <label class="form-label">Search</label
                ><input
                  class="form-control"
                  id="attendanceSearch"
                  placeholder="Search employee or notes"
                />
              </div>
              <div>
                <label class="form-label">Date</label
                ><input
                  class="form-control"
                  id="attendanceDateFilter"
                  type="date"
                />
              </div>
              <div>
                <label class="form-label">Employee</label
                ><select
                  class="form-select"
                  id="attendanceEmployeeFilter"
                ></select>
              </div>
              <div>
                <label class="form-label">Status</label
                ><select class="form-select" id="attendanceStatusFilter">
                  <option value="">All statuses</option>
                  <option>Present</option>
                  <option>Absent</option>
                  <option>Late</option>
                  <option>Remote</option>
                </select>
              </div>
              <button
                class="btn btn-outline-light"
                id="clearAttendanceFilters"
                type="button"
              >
                Clear
              </button>
            </div>
            <div id="attendanceTableWrap"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/attendance.js"></script>
  </body>
</html>
