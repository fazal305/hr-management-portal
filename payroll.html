<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payroll Preview | HR Management Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
    <link href="css/payroll.css" rel="stylesheet" />
  </head>
  <body>
    <div class="hr-app">
      <div id="sidebarMount"></div>
      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="page-kicker">Compensation</p>
            <h1 class="page-title">Payroll Preview</h1>
            <p class="page-subtitle">
              Preview net pay using salary, attendance deductions, bonuses, and
              manual deductions.
            </p>
          </div>
          <button
            class="btn btn-outline-info mobile-nav-toggle"
            id="mobileNavToggle"
            type="button"
          >
            Menu
          </button>
        </header>
        <section class="content">
          <div id="statusMessage" class="status-message"></div>
          <div class="hr-grid grid-4 payroll-summary" id="payrollStats"></div>
          <section class="table-panel">
            <div class="payroll-controls">
              <div class="payroll-filter">
                <label class="form-label">Department</label
                ><select
                  class="form-select"
                  id="payrollDepartmentFilter"
                ></select>
              </div>
              <button class="btn btn-primary" id="exportPayroll" type="button">
                Export Payroll JSON
              </button>
            </div>
            <div id="payrollTableWrap"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/payroll.js"></script>
  </body>
</html>
