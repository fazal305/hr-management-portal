<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employees | HR Management Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="styles.css" rel="stylesheet" />
    <link href="css/employees.css" rel="stylesheet" />
  </head>
  <body>
    <div class="hr-app">
      <div id="sidebarMount"></div>
      <main class="main-shell">
        <header class="topbar">
          <div>
            <p class="page-kicker">People Operations</p>
            <h1 class="page-title">Employees</h1>
            <p class="page-subtitle">
              Create, update, search, and organize employee records across
              departments, roles, salaries, and statuses.
            </p>
          </div>
          <button
            class="btn btn-outline-info mobile-nav-toggle"
            id="mobileNavToggle"
            type="button"
          >
            Menu
          </button>
        </header>
        <section class="content">
          <div id="statusMessage" class="status-message"></div>
          <section class="form-panel mb-3">
            <div class="panel-header">
              <div>
                <h2 class="panel-title" id="employeeFormTitle">Add Employee</h2>
                <p class="panel-note">
                  Employee records are saved to localStorage.
                </p>
              </div>
              <button
                class="btn btn-outline-light"
                id="resetEmployeeForm"
                type="button"
              >
                Clear Form
              </button>
            </div>
            <form id="employeeForm">
              <input type="hidden" id="employeeId" />
              <div class="employee-form-grid">
                <div>
                  <label class="form-label">First Name</label
                  ><input class="form-control" id="firstName" required />
                </div>
                <div>
                  <label class="form-label">Last Name</label
                  ><input class="form-control" id="lastName" required />
                </div>
                <div>
                  <label class="form-label">Email</label
                  ><input
                    class="form-control"
                    id="email"
                    type="email"
                    required
                  />
                </div>
                <div>
                  <label class="form-label">Phone</label
                  ><input class="form-control" id="phone" required />
                </div>
                <div>
                  <label class="form-label">Department</label
                  ><select
                    class="form-select"
                    id="departmentId"
                    required
                  ></select>
                </div>
                <div>
                  <label class="form-label">Job Title</label
                  ><input class="form-control" id="jobTitle" required />
                </div>
                <div>
                  <label class="form-label">Employment Type</label
                  ><select class="form-select" id="employmentType">
                    <option>Full-time</option>
                    <option>Part-time</option>
                    <option>Contract</option>
                    <option>Intern</option>
                  </select>
                </div>
                <div>
                  <label class="form-label">Status</label
                  ><select class="form-select" id="status">
                    <option>Active</option>
                    <option>On Leave</option>
                    <option>Resigned</option>
                  </select>
                </div>
                <div>
                  <label class="form-label">Monthly Salary</label
                  ><input
                    class="form-control"
                    id="monthlySalary"
                    type="number"
                    min="0"
                    step="1000"
                    required
                  />
                </div>
                <div>
                  <label class="form-label">Joining Date</label
                  ><input
                    class="form-control"
                    id="joiningDate"
                    type="date"
                    required
                  />
                </div>
                <div class="span-2 d-flex align-items-end gap-2">
                  <button class="btn btn-primary" type="submit">
                    Save Employee</button
                  ><button
                    class="btn btn-outline-info"
                    id="copyEmployeeSummary"
                    type="button"
                  >
                    Copy Summary
                  </button>
                </div>
              </div>
            </form>
          </section>
          <section class="table-panel">
            <div class="panel-header">
              <div>
                <h2 class="panel-title">Employee Directory</h2>
                <p class="panel-note">
                  Search by name, email, phone, title, or department.
                </p>
              </div>
            </div>
            <div class="filter-bar">
              <div>
                <label class="form-label">Search</label
                ><input
                  class="form-control"
                  id="employeeSearch"
                  placeholder="Search employees..."
                />
              </div>
              <div>
                <label class="form-label">Department</label
                ><select class="form-select" id="departmentFilter"></select>
              </div>
              <div>
                <label class="form-label">Status</label
                ><select class="form-select" id="statusFilter">
                  <option value="">All statuses</option>
                  <option>Active</option>
                  <option>On Leave</option>
                  <option>Resigned</option>
                </select>
              </div>
              <div>
                <label class="form-label">Employment Type</label
                ><select class="form-select" id="typeFilter">
                  <option value="">All types</option>
                  <option>Full-time</option>
                  <option>Part-time</option>
                  <option>Contract</option>
                  <option>Intern</option>
                </select>
              </div>
              <button
                class="btn btn-outline-light"
                id="clearEmployeeFilters"
                type="button"
              >
                Clear
              </button>
            </div>
            <div id="employeeCards" class="employee-card-grid mb-3"></div>
            <div id="employeesTableWrap"></div>
          </section>
        </section>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/employees.js"></script>
  </body>
</html>
