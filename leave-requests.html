<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Leave Requests | HR Management Portal</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="styles.css" rel="stylesheet"><link href="css/leave-requests.css" rel="stylesheet"></head><body><div class="hr-app"><div id="sidebarMount"></div><main class="main-shell"><header class="topbar"><div><p class="page-kicker">Leave Workflow</p><h1 class="page-title">Leave Requests</h1><p class="page-subtitle">Create, edit, approve, reject, search, and filter employee leave requests.</p></div><button class="btn btn-outline-info mobile-nav-toggle" id="mobileNavToggle" type="button">Menu</button></header><section class="content"><div id="statusMessage" class="status-message"></div><section class="form-panel mb-3"><div class="panel-header"><div><h2 class="panel-title" id="leaveFormTitle">Create Leave Request</h2><p class="panel-note">Days are calculated automatically from start and end dates.</p></div><button class="btn btn-outline-light" id="resetLeaveForm" type="button">Clear Form</button></div><form id="leaveForm"><input type="hidden" id="leaveId"><div class="leave-form-grid"><div><label class="form-label">Employee</label><select class="form-select" id="leaveEmployee" required></select></div><div><label class="form-label">Type</label><select class="form-select" id="leaveType"><option>Sick</option><option>Casual</option><option>Annual</option><option>Unpaid</option></select></div><div><label class="form-label">Start</label><input class="form-control" id="startDate" type="date" required></div><div><label class="form-label">End</label><input class="form-control" id="endDate" type="date" required></div><div><label class="form-label">Reason</label><input class="form-control" id="leaveReason" required></div><button class="btn btn-primary" type="submit">Save</button></div></form></section><section class="table-panel"><div class="filter-bar"><div><label class="form-label">Search</label><input class="form-control" id="leaveSearch" placeholder="Search employee or reason"></div><div><label class="form-label">Type</label><select class="form-select" id="leaveTypeFilter"><option value="">All types</option><option>Sick</option><option>Casual</option><option>Annual</option><option>Unpaid</option></select></div><div><label class="form-label">Status</label><select class="form-select" id="leaveStatusFilter"><option value="">All statuses</option><option>Pending</option><option>Approved</option><option>Rejected</option></select></div><button class="btn btn-outline-light" id="clearLeaveFilters" type="button">Clear</button></div><div id="leaveBoard" class="leave-board"></div></section></section></main></div><script src="https://code.jquery.com/jquery-3.7.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="js/shared.js"></script><script src="js/leave-requests.js"></script></body></html>
